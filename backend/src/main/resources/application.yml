spring:
  application:
    name: I0 SalesCore
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/io_salescore
    username: postgres
    password: 211601
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always

app:
  jwt:
    secret: i0LabsSalesCoreSecretKey2026ProductionGradeJWTSecretMustBe256BitsLong!
    access-token-expiry: 3600000      # 1 hour in ms
    refresh-token-expiry: 604800000   # 7 days in ms

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.iolabs.salescore: DEBUG
    org.springframework.security: INFO
