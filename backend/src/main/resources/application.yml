spring:
  application:
    name: I0 SalesCore
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/io_salescore}
    username: ${DATASOURCE_USERNAME:postgres}
    # Override in production; default preserved for existing local setups in this project.
    password: ${DATASOURCE_PASSWORD:211601}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always

app:
  jwt:
    # Override in production with APP_JWT_SECRET (min ~32 characters for HS256).
    secret: ${APP_JWT_SECRET:i0LabsSalesCoreSecretKey2026ProductionGradeJWTSecretMustBe256BitsLong!}
    access-token-expiry: ${APP_JWT_ACCESS_EXPIRY_MS:3600000}
    refresh-token-expiry: ${APP_JWT_REFRESH_EXPIRY_MS:604800000}

  bootstrap:
    token: ${APP_BOOTSTRAP_TOKEN:}

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:3000}

  paystack:
    verification-enabled: ${APP_PAYSTACK_VERIFICATION_ENABLED:true}
    secret-key: ${APP_PAYSTACK_SECRET_KEY:}
    verify-url: ${APP_PAYSTACK_VERIFY_URL:https://api.paystack.co/transaction/verify}
    expected-currency: ${APP_PAYSTACK_EXPECTED_CURRENCY:GHS}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.iolabs.salescore: DEBUG
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
