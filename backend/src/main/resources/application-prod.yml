spring:
  jpa:
    show-sql: false

  flyway:
    validate-on-migrate: true

app:
  cors:
    # Deployed frontend (Vercel) calls the Render API cross-origin.
    # Patterns are supported (e.g. https://*.vercel.app).
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://*.vercel.app}

server:
  error:
    include-stacktrace: never
    include-message: always
    include-binding-errors: never

logging:
  level:
    root: INFO
    com.iolabs.salescore: INFO
    org.springframework.security: WARN

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
